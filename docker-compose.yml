version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: credit-ledger-postgres
    environment:
      POSTGRES_DB: credit_ledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - credit-ledger-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: credit-ledger-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - credit-ledger-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: credit-ledger-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_NAME: credit_ledger
      REDIS_URL: redis://redis:6379
      STELLAR_NETWORK: testnet
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      STELLAR_ADMIN_SECRET: ${STELLAR_ADMIN_SECRET}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - credit-ledger-network
    restart: unless-stopped

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: credit-ledger-frontend
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_STELLAR_NETWORK: testnet
      VITE_STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - credit-ledger-network
    restart: unless-stopped

  # Stellar Quickstart (for local testing)
  stellar:
    image: stellar/quickstart:latest
    container_name: credit-ledger-stellar
    ports:
      - "8000:8000"  # Horizon
      - "8001:8001"  # Soroban RPC
      - "8002:8002"  # Friendbot
    environment:
      - --local
    networks:
      - credit-ledger-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  credit-ledger-network:
    driver: bridge
